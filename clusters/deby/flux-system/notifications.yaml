# Flux notification-controller routes reconciliation events to the
# in-cluster Alertmanager. Alertmanager dedups and emails to jim@willeke.com
# via the existing Gmail receiver, so Flux failures arrive in the same
# inbox as host/cluster alerts.
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: alertmanager
  namespace: flux-system
spec:
  type: alertmanager
  address: http://alertmanager.monitoring:9093/api/v2/alerts
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: flux-failures
  namespace: flux-system
spec:
  providerRef:
    name: alertmanager
  # Severity 'error' = reconciliation failed; 'info' would also include
  # successful reconciliation events (too noisy for an alert path).
  eventSeverity: error
  eventSources:
    - kind: Kustomization
      name: '*'
    - kind: HelmRelease
      name: '*'
    - kind: GitRepository
      name: '*'
    - kind: HelmRepository
      name: '*'
    - kind: OCIRepository
      name: '*'
  exclusionList:
    # Filter out the very chatty "context deadline exceeded" transient
    # network blips that auto-recover; only real failures should email.
    - 'context deadline exceeded'
