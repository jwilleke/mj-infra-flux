apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudflared
  namespace: flux-system
spec:
  interval: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Scoped strictly to the cloudflared app dir so SOPS decryption only
  # touches files we know are encrypted to the Flux sops-age recipient.
  # The broader `apps` Kustomization deliberately doesn't enable decryption
  # because other (legacy) encrypted files in apps/production/ are
  # encrypted to a different, unavailable age key — see
  # apps/production/kustomization.yaml comment.
  path: ./apps/production/cloudflared
  # Temporarily prune: false so the upcoming deletion of this Kustomization
  # (folding cloudflared back into the apps Kustomization now that all
  # encrypted files share one age recipient) won't garbage-collect the
  # cloudflared resources between when this Kustomization is removed and
  # when apps adopts them via server-side apply.
  prune: false
  wait: true
  timeout: 5m0s
  decryption:
    provider: sops
    secretRef:
      name: sops-age
