apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  # infra-configs can contain some infra changes we assume in apps:
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  # unlike kustomize resource paths, these paths are relative to the repo
  path: ./apps/production
  prune: true
  wait: true
  timeout: 5m0s
  # Originally added in #58, reverted in #59 because legacy prometheus +
  # transmission encrypted files used the unavailable age1nur86… recipient.
  # All encrypted files under apps/production are now aligned to age1sr8j…
  # (transmission via a736401, prometheus self-scrape file deleted as unused
  # in bedcce0, alertmanager re-encrypted in 35ba6ed). Re-enabling so that
  # alertmanager's gmail_app_password actually decrypts at apply time —
  # otherwise SMTP auth gets the ciphertext as the password and silently fails.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
