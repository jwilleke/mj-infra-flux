apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m0s
  # infra-configs can contain some infra changes we assume in apps:
  dependsOn:
    - name: infra-configs
  sourceRef:
    kind: GitRepository
    name: flux-system
  # unlike kustomize resource paths, these paths are relative to the repo
  path: ./apps/production
  prune: true
  wait: true
  timeout: 5m0s
  # SOPS-encrypted secrets in apps/production/<app>/.env.secret.*.encrypted
  # are decrypted by kustomize-controller using the age key in
  # `sops-age` (flux-system namespace) before kustomize secretGenerator
  # turns them into k8s Secrets.
  decryption:
    provider: sops
    secretRef:
      name: sops-age
