# Local copy of the authentik forward-auth middleware for the kube-system namespace.
# Traefik kubernetescrd refs are same-namespace only — each namespace carries
# its own copy (same pattern as teslamate, monitoring/prometheus, netalertx-proxy).
# Referenced by ingress.yaml as kube-system-authentik-forwardauth@kubernetescrd.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: kube-system
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
