apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: teslamate
  namespace: teslamate
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # INTERNAL-SSO (docs/access/standards.md): same-namespace authentik forward-auth.
    # NOTE: must be teslamate-* (this route's namespace) — a cross-namespace ref
    # (e.g. authentik-*) is silently dropped by Traefik and serves unauthenticated.
    traefik.ingress.kubernetes.io/router.middlewares: teslamate-authentik-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - teslamate.nerdsbythehour.com
    secretName: teslamate-tls
  rules:
  - host: teslamate.nerdsbythehour.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: teslamate
            port:
              number: 4000
