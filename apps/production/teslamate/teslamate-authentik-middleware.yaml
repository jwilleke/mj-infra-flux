# Local copy of the authentik forward-auth middleware. Traefik kubernetescrd
# refs are same-namespace only, so each app namespace carries its own copy
# (same pattern as monitoring/prometheus and netalertx-proxy). Referenced by
# teslamate-ingress.yaml as teslamate-authentik-forwardauth@kubernetescrd.
# Standard: docs/access/standards.md (Tier INTERNAL-SSO).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authentik-forwardauth
  namespace: teslamate
spec:
  forwardAuth:
    address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
