apiVersion: apps/v1
kind: Deployment
metadata:
  name: jimsmcp
  namespace: jimsmcp
  labels:
    # Opts into the Grafana env-health-noc "Cluster" row's dynamic repeated
    # panel (label_values(kube_deployment_labels{label_noc_monitor="true"}, deployment)).
    # See apps/production/monitoring/README.md.
    noc-monitor: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jimsmcp
  template:
    metadata:
      labels:
        app: jimsmcp
    spec:
      serviceAccountName: jimsmcp
      imagePullSecrets:
        - name: ghcr-jimsmcp
      containers:
      - name: jimsmcp
        image: ghcr.io/jwilleke/jimsmcp:2026-05-05
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9210
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "9210"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 9210
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 9210
          initialDelaySeconds: 10
          periodSeconds: 10
