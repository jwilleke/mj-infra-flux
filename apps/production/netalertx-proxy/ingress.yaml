# Internal-only ingress for NetAlertX. Forward-auth via Authentik (NetAlertX has
# no native OIDC). Cert via cert-manager DNS-01 (Cloudflare) — works without any
# public/inbound exposure. Keep NetAlertX inside-only: NO UDM port-forward, and
# the DNS record points at the private 192.168.68.71 (see README.md).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: netalertx
  namespace: netalertx-proxy
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-production"
    traefik.ingress.kubernetes.io/router.middlewares: netalertx-proxy-authentik-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - netalertx.nerdsbythehour.com
      secretName: netalertx-nerdsbythehour-com-tls
  rules:
    - host: netalertx.nerdsbythehour.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: netalertx-external
                port:
                  number: 20211
