apiVersion: v1
kind: ConfigMap
metadata:
  name: owntracks-recorder-config
  namespace: owntracks
data:
  OTR_HOST: mosquitto.messaging.svc.cluster.local
  OTR_PORT: "1883"
  # Inert subscription on purpose: the Lua hook republishes HTTP-arrived
  # messages onto owntracks/<user>/<device>, and we must not let the recorder
  # subscribe to its own publish (would loop + double-store). HTTP arrivals
  # are unaffected by OTR_TOPICS.
  OTR_TOPICS: "none/#"
  OTR_LUASCRIPT: /lua/hook.lua
  OTR_STORAGEDIR: /store
  OTR_PORT_HTTP: "8083"
  OTR_HTTPHOST: "0.0.0.0"
