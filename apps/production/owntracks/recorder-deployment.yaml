apiVersion: apps/v1
kind: Deployment
metadata:
  name: owntracks-recorder
  namespace: owntracks
  labels:
    app: owntracks-recorder
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: owntracks-recorder
  template:
    metadata:
      labels:
        app: owntracks-recorder
    spec:
      # Alpine musl + k8s default ndots:5 makes the FQDN
      # mosquitto.messaging.svc.cluster.local go through search-list expansion
      # first; libmosquitto's connect path gives up before absolute lookup
      # resolves. Same workaround as cloudflared/ and geohazardwatch.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: recorder
          image: docker.io/owntracks/recorder:1.0.1 # {"$imagepolicy": "flux-system:owntracks-recorder"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: owntracks-recorder-config
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          volumeMounts:
            - name: store
              mountPath: /store
            - name: lua-hook
              mountPath: /lua
              readOnly: true
            - name: visual-html
              mountPath: /htdocs/visual.html
              subPath: visual.html
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: store
          persistentVolumeClaim:
            claimName: owntracks-store-pvc
        - name: lua-hook
          configMap:
            name: owntracks-recorder-lua
        - name: visual-html
          configMap:
            name: owntracks-visual-html
      restartPolicy: Always
