apiVersion: apps/v1
kind: Deployment
metadata:
  name: geohazardwatch
  namespace: geohazardwatch
  labels:
    app: geohazardwatch
spec:
  replicas: 1
  # Recreate, not RollingUpdate: hostNetwork:true below means old/new pods
  # would otherwise fight over binding port 3000 on the same single node
  # (deby is the only node) during a rollout. Trades zero-downtime deploys
  # for a working IPv6 route (geohazardwatch#134-class fix, this time for
  # the always-on Deployment rather than the import CronJob).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: geohazardwatch
  template:
    metadata:
      labels:
        app: geohazardwatch
    spec:
      securityContext:
        fsGroup: 1000
      # flannel's pod network is IPv4-only; borrow deby's own IPv6 so the
      # feeds addon can reach IPv6-only sources like NASA COOLR
      # (maps.nccs.nasa.gov, landslide-events) from this always-on pod too.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      # Alpine musl + k8s default ndots:5 breaks getaddrinfo for external
      # hostnames (search-list expansion misfires). Override ndots so the
      # resolver treats any name with at least one dot as absolute first.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      initContainers:
        - name: wait-for-data
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until [ -d /app/data ] && touch /app/data/.init-check && rm /app/data/.init-check; do
                echo "waiting for /app/data (NFS mount)..."; sleep 2
              done
              echo "/app/data is writable — proceeding"
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: geohazardwatch
          image: ghcr.io/jwilleke/geohazardwatch:1.2.105 # {"$imagepolicy": "flux-system:geohazardwatch"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HEADLESS_INSTALL
              value: "true"
            - name: INSTANCE_DATA_FOLDER
              value: "/app/data"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: geohazardwatch-secrets
                  key: session-secret
                  optional: true
            # Authentik client credentials for the agent-ingest flow
            # (mj-infra-flux#124, ngdpbase#822) — secret via ngdpbase-ingest-creds.sops.yaml
            - name: NGDPBASE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: ngdpbase-ingest-creds
                  key: client-id
                  optional: true
            - name: NGDPBASE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ngdpbase-ingest-creds
                  key: client-secret
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: org
              mountPath: /app/data/organizations/geohazardwatch.json
              subPath: geohazardwatch.json
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 15
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: /mnt/tank/jims/data/systems/geohazardwatch
            type: DirectoryOrCreate
        - name: org
          configMap:
            name: geohazardwatch-config
            items:
              - key: geohazardwatch.json
                path: geohazardwatch.json
      restartPolicy: Always
