apiVersion: apps/v1
kind: Deployment
metadata:
  name: geohazardwatch
  namespace: geohazardwatch
  labels:
    app: geohazardwatch
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: geohazardwatch
  template:
    metadata:
      labels:
        app: geohazardwatch
    spec:
      securityContext:
        fsGroup: 1000
      # Alpine musl + k8s default ndots:5 breaks getaddrinfo for external
      # hostnames (search-list expansion misfires). Override ndots so the
      # resolver treats any name with at least one dot as absolute first.
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: geohazardwatch
          image: ghcr.io/jwilleke/geohazardwatch:1.2.9 # {"$imagepolicy": "flux-system:geohazardwatch"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: HEADLESS_INSTALL
              value: "true"
            - name: INSTANCE_DATA_FOLDER
              value: "/app/data"
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: geohazardwatch-secrets
                  key: session-secret
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: org
              mountPath: /app/data/organizations/geohazardwatch.json
              subPath: geohazardwatch.json
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: /mnt/tank/jims/data/systems/geohazardwatch
            type: DirectoryOrCreate
        - name: org
          configMap:
            name: geohazardwatch-config
            items:
              - key: geohazardwatch.json
                path: geohazardwatch.json
      restartPolicy: Always
