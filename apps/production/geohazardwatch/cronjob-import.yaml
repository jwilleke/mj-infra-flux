apiVersion: batch/v1
kind: CronJob
metadata:
  name: geohazardwatch-data-refresh
  namespace: geohazardwatch
spec:
  # 04:00 America/New_York (08:00 UTC) — low-traffic
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          # flannel's pod network is IPv4-only (geohazardwatch#134); borrow
          # deby's own IPv6 (working since the Spectrum PD fix) so imports
          # can reach IPv6-only sources like NASA COOLR.
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          securityContext:
            fsGroup: 1000
          # See deployment.yaml — Alpine musl needs ndots:1 so external
          # hostnames resolve correctly via getaddrinfo.
          dnsConfig:
            options:
              - name: ndots
                value: "1"
          containers:
            - name: import
              image: ghcr.io/jwilleke/geohazardwatch:1.2.101 # {"$imagepolicy": "flux-system:geohazardwatch"}
              imagePullPolicy: IfNotPresent
              # geohazardwatch#152/#154 migrated to the packaged (npm) addon
              # model — the addon (and its import/ scripts) now installs to
              # node_modules under /app instead of being copied to
              # /opt/geohazardwatch. Verified against the actual 1.2.101 image.
              workingDir: /app
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  DATA_DIR=/app/data/ve-geology
                  ADDON_DIR=node_modules/@jwilleke/geohazardwatch-addon
                  mkdir -p "$DATA_DIR"
                  echo "Importing GVP volcanoes + eruptions + global activity..."
                  node "$ADDON_DIR/import/import-volcanoes.js" \
                    --eruptions --activity --data-dir "$DATA_DIR"
                  echo "Importing USGS earthquakes..."
                  node "$ADDON_DIR/import/import-earthquakes.js" \
                    --data-dir "$DATA_DIR"
                  echo "Importing USGS HANS volcano alerts..."
                  node "$ADDON_DIR/import/import-hans.js" \
                    --data-dir "$DATA_DIR"
                  echo "Refresh complete."
              volumeMounts:
                - name: data
                  mountPath: /app/data
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "1000m"
                  memory: "1Gi"
          volumes:
            - name: data
              hostPath:
                path: /mnt/tank/jims/data/systems/geohazardwatch
                type: DirectoryOrCreate
