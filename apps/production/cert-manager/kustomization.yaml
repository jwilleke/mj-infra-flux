apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager-namespace operational Secrets that need to be in Git (not the
# cert-manager workload itself — that lives under apps/base/cert-manager/, which
# is currently not Flux-reconciled; tracked as a separate drift item).
#
# This kustomization just owns the cloudflare-api-token Secret used by the live
# ClusterIssuers' DNS-01 solver. Migrated out of hand-applied state on
# 2026-05-22 as part of mj-infra-flux#77 item 1.

resources:
  - ./cloudflare-api-token.sops.yaml
