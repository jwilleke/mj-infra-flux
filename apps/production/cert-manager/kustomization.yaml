apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# cert-manager declarative config that needs to be Flux-reconciled.
#
# In scope: the cloudflare-api-token Secret (migrated 2026-05-22 in
# mj-infra-flux#77 item 1) AND the two ClusterIssuers that reference it
# (migrated 2026-05-22 in mj-infra-flux#81 — live spec preserved byte-identical;
# the old apps/base/cert-manager/base/other/letsencrypt-*-clusterissuer.yaml
# manifests declared HTTP-01 only and never matched live state).
#
# Out of scope (still hand-applied): the cert-manager workload itself
# (Deployment, CRDs, webhook, RBAC) — separate concern, lives under
# apps/base/cert-manager/ and is intentionally not wired into Flux. See
# apps/base/cert-manager/README-cert-manager.md.

resources:
  - ./cloudflare-api-token.sops.yaml
  - ./letsencrypt-staging-clusterissuer.yaml
  - ./letsencrypt-production-clusterissuer.yaml
