apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Infrastructure - Traefik ingress controller and cert-manager workload
  # itself live in apps/base/ (currently not Flux-reconciled — see mj-infra-flux
  # cert-manager-drift follow-up). The cert-manager directory below carries
  # only the operational Secrets that need to be in Git (cloudflare-api-token).
  - ./cert-manager   # SOPS-encrypted cloudflare-api-token for DNS-01 (mj-infra-flux#77 item 1)

  # Shared Infrastructure
  - ./database       # Shared PostgreSQL
  - ./messaging      # Shared Mosquitto MQTT
  - ./monitoring     # Grafana & Prometheus
  - ./shared-resources  # Static file server for icons, logos, and shared assets

  # Authentication & Identity Provider
  - ./authentik

  # Public Applications (Guest Services)
  - ./guest-services
  - ./cloudflared    # Cloudflare Tunnel connector for geohazardwatch.com (folded back in 2026-05-09; SOPS decryption now on apps Kustomization)

  # Public & Protected Applications
  - ./landingpage

  # Protected Applications
  - ./yourphr            # Personal health record aggregator; authentik forward-auth, internal-only (mj-infra-flux#103)
  - ./yourphr-relay      # SMART OAuth relay; public via Cloudflare Tunnel (yourphr#50, mj-infra-flux#104+#105)
  - ./traefik-dashboard  # Traefik dashboard at traefik.nerdsbythehour.com; authentik forward-auth (mj-infra-flux#89)
  - ./teslamate
  - ./home-assistant-proxy
  - ./netalertx-proxy  # Traefik+Authentik front for NetAlertX on deby (deby#24); internal-only
  - ./jimsmcp        # MCP server for custom infrastructure features
  - ./geohazardwatch # ngdpbase + ve-geology addon at geohazardwatch.com
  - ./owntracks      # OwnTracks Recorder; phones publish via cloudflared, republishes owntracks/# to MQTT for HA

  # Cluster-level Flux image automation (ImageRepository / ImagePolicy /
  # ImageUpdateAutomation, all in flux-system namespace; the inner
  # kustomization deliberately has no `namespace:` directive so they
  # stay there).
  - ./image-automation
