apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Infrastructure - Traefik ingress controller and cert-manager
  # These are in apps/base/ and work properly

  # Shared Infrastructure
  - ./database       # Shared PostgreSQL
  - ./messaging      # Shared Mosquitto MQTT
  - ./monitoring     # Grafana & Prometheus
  - ./shared-resources  # Static file server for icons, logos, and shared assets

  # Authentication & Identity Provider
  - ./authentik

  # Public Applications (Guest Services)
  - ./guest-services
  # NOTE: cloudflared is NOT here. It runs via its own Flux Kustomization
  # at clusters/deby/cloudflared.yaml with `decryption: sops` enabled, so
  # it can decrypt its TUNNEL_TOKEN without forcing the apps Kustomization
  # to also decrypt the existing monitoring/transmission encrypted files
  # (which use a different age recipient).

  # Public & Protected Applications
  - ./landingpage

  # Protected Applications
  - ./teslamate
  - ./jimswiki
  - ./home-assistant-proxy
  - ./jimsmcp        # MCP server for custom infrastructure features
  - ./jimstest       # ngdpbase dev/test instance on jminm4
  - ./geohazardwatch # ngdpbase + ve-geology addon at geohazardwatch.com

  # Cluster-level Flux image automation (ImageRepository / ImagePolicy /
  # ImageUpdateAutomation, all in flux-system) for apps above that publish
  # to private GHCR. Pull secrets are SOPS-encrypted alongside.
  - ./image-automation
