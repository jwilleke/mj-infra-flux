# Hourly SQLite backup of the fasten health-records database to NAS.
# Uses sqlite3 .backup (hot backup — consistent regardless of open transactions).
# NAS path: 192.168.68.41:/var/nfs/shared/jims → /mnt/tank/jims/data/fasten-backup/
# Retains 7 daily backups by filename (YYYYMMDD); keeps the latest as fasten-latest.db.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: fasten-backup
  namespace: fasten
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  apk add --no-cache sqlite > /dev/null 2>&1
                  DB=/data/fasten.db
                  DEST=/nas-backup
                  DATE=$(date +%Y%m%d)
                  echo "Backing up $DB → $DEST/fasten-$DATE.db"
                  sqlite3 "$DB" ".backup $DEST/fasten-$DATE.db"
                  cp "$DEST/fasten-$DATE.db" "$DEST/fasten-latest.db"
                  # Prune backups older than 7 days
                  find "$DEST" -name "fasten-2*.db" -mtime +7 -delete
                  echo "Backup complete."
              volumeMounts:
                - name: fasten-data
                  mountPath: /data
                  readOnly: true
                - name: nas-backup
                  mountPath: /nas-backup
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
          volumes:
            - name: fasten-data
              persistentVolumeClaim:
                claimName: fasten-data
            - name: nas-backup
              hostPath:
                path: /mnt/tank/jims/data/fasten-backup
                type: DirectoryOrCreate
