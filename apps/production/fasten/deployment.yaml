apiVersion: apps/v1
kind: Deployment
metadata:
  name: fasten
  namespace: fasten
  labels:
    app: fasten
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fasten
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fasten
    spec:
      containers:
        - name: fasten
          # CI: https://github.com/jwilleke/yourphr/actions/workflows/docker-jwilleke.yaml
          # Flux image-automation picks the latest main-<N> tag (numerical order).
          # Run scripts/fasten-pin.sh only if you need to manually override.
          image: ghcr.io/jwilleke/yourphr:main-50 # {"$imagepolicy": "flux-system:fasten"}
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: fasten-data
              mountPath: /opt/fasten/db
            - name: fasten-config
              mountPath: /opt/fasten/config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: fasten-data
          persistentVolumeClaim:
            claimName: fasten-data
        - name: fasten-config
          configMap:
            name: fasten-config
