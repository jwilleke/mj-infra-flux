apiVersion: apps/v1
kind: Deployment
metadata:
  name: fasten
  namespace: fasten
  labels:
    app: fasten
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fasten
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: fasten
    spec:
      containers:
        - name: fasten
          # Temporarily reverted to upstream while jwilleke fork build completes.
          # Switch back to ghcr.io/jwilleke/fasten-onprem:main once image is available.
          image: ghcr.io/fastenhealth/fasten-onprem:main
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: fasten-data
              mountPath: /opt/fasten/db
            - name: fasten-config
              mountPath: /opt/fasten/config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: fasten-data
          persistentVolumeClaim:
            claimName: fasten-data
        - name: fasten-config
          configMap:
            name: fasten-config
