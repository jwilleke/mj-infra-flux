apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# YourPHR SMART OAuth store-and-poll relay (EPIC #20, yourphr#50). Deploys into the
# existing `yourphr` namespace (owned by ../yourphr/namespace.yaml — not redeclared here).
resources:
  - ./deployment.yaml
  - ./service.yaml
  - ./ingress.yaml
  # Create the encrypted secret from relay-secret.sops.yaml.example, then uncomment:
  # - ./relay-secret.sops.yaml

labels:
  - pairs:
      app.jimwilleke.com/name: yourphr-relay
