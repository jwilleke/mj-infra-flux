apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# YourPHR SMART OAuth store-and-poll relay (EPIC #20, yourphr#50). Deploys into the
# existing `yourphr` namespace (owned by ../yourphr/namespace.yaml — not redeclared here).
resources:
  - ./deployment.yaml
  - ./service.yaml
  # Public exposure is via the Cloudflare Tunnel (dashboard-managed), NOT a Traefik
  # ingress — this network has no public inbound to Traefik. See README.md.
  - ./relay-secret.sops.yaml

labels:
  - pairs:
      app.jimwilleke.com/name: yourphr-relay
