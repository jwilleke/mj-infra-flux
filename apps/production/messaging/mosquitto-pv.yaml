apiVersion: v1
kind: PersistentVolume
metadata:
  name: mosquitto-data-pv
  labels:
    app: mosquitto
    type: data
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/local-k3s-data/mosquitto/data
    type: DirectoryOrCreate
