apiVersion: apps/v1
kind: Deployment
metadata:
  name: yourphr
  namespace: yourphr
  labels:
    app: yourphr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yourphr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: yourphr
    spec:
      containers:
        - name: yourphr
          # CI: https://github.com/jwilleke/yourphr/actions/workflows/docker-jwilleke.yaml
          # Flux image-automation picks the latest main-<N> tag (numerical order).
          # Run scripts/yourphr-pin.sh only if you need to manually override.
          image: ghcr.io/jwilleke/yourphr:main-364 # {"$imagepolicy": "flux-system:yourphr"}
          ports:
            - containerPort: 8080
              name: http
          env:
            # Poll the relay over the in-cluster Service, NOT its public Cloudflare URL.
            # The backend runs inside the cluster; hitting https://relay.nerdsbythehour.com
            # from here hairpins out to Cloudflare and back through the tunnel and times out
            # (observed: "Get https://relay.nerdsbythehour.com/pending …: context deadline
            # exceeded"). The in-cluster Service reaches the same relay pod directly. (yourphr#51)
            - name: YOURPHR_RELAY_URL
              value: "http://yourphr-relay.yourphr.svc.cluster.local:8080"
            # Shared secret for polling the SMART OAuth relay's /pending (yourphr#50/#51).
            # Same value as the relay's own secret (../yourphr-relay/relay-secret.sops.yaml).
            # optional: the app starts without it; the relay-connect path just returns
            # "relay not configured" until it's present.
            - name: YOURPHR_RELAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: yourphr-relay
                  key: YOURPHR_RELAY_SECRET
                  optional: true
            # C-CDA / CCD converter sidecar (mj-infra-flux#114, yourphr#254).
            # Reaches the converter in-cluster; same namespace so short DNS resolves.
            - name: YOURPHR_CDA_CONVERTER_ENABLED
              value: "true"
            - name: YOURPHR_CDA_CONVERTER_URL
              value: "http://yourphr-cda-converter.yourphr.svc.cluster.local:8080"
            # Admin-only sandbox provider credentials (yourphr#291). The backend seeds the /sandbox
            # catalog entries from these at startup, so the admin connects with one click and the
            # client_id/secret never reach the browser. From ./sandbox-credentials.sops.yaml; all
            # optional so the app still starts (and just shows no sandboxes) if a value is absent.
            - name: YOURPHR_SANDBOX_BLUEBUTTON_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_BLUEBUTTON_CLIENT_ID
                  optional: true
            - name: YOURPHR_SANDBOX_BLUEBUTTON_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_BLUEBUTTON_CLIENT_SECRET
                  optional: true
            - name: YOURPHR_SANDBOX_EPIC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_EPIC_CLIENT_ID
                  optional: true
            - name: YOURPHR_SANDBOX_ORACLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_ORACLE_CLIENT_ID
                  optional: true
            - name: YOURPHR_SANDBOX_ATHENA_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_ATHENA_CLIENT_ID
                  optional: true
            - name: YOURPHR_SANDBOX_ATHENA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: yourphr-sandbox-credentials
                  key: YOURPHR_SANDBOX_ATHENA_CLIENT_SECRET
                  optional: true
          volumeMounts:
            - name: yourphr-data
              mountPath: /opt/fasten/db
            - name: yourphr-config
              mountPath: /opt/fasten/config
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              # Raised 1Gi -> 2Gi: the backend was OOMKilled (exit 137) intermittently — baseline is
              # ~33Mi but it occasionally spikes past 1Gi (heavy FHIR query/import over the Blue Button
              # data, or a slow leak over hours). Headroom stops the crash-restart 503s. If it OOMs
              # again at 2Gi, it's a leak — profile the backend (pprof) rather than just raising again.
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: yourphr-data
          persistentVolumeClaim:
            claimName: yourphr-data
        - name: yourphr-config
          configMap:
            name: yourphr-config
