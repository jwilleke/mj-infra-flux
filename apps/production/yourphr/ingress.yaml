# yourphr.nerdsbythehour.com — internal only (no public Cloudflare DNS record).
# LAN-reachable, authentik-authenticated (forward-auth tier).
# See docs/access/access.md and mj-infra-flux#99.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yourphr-ingress
  namespace: yourphr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-production
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: yourphr-authentik-forwardauth@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - yourphr.nerdsbythehour.com
      secretName: yourphr-nerdsbythehour-com-tls
  rules:
    - host: yourphr.nerdsbythehour.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yourphr
                port:
                  number: 8080
