apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: fasten
  namespace: flux-system
spec:
  image: ghcr.io/jwilleke/fasten-onprem
  interval: 5m
  # GHCR package must be PUBLIC for anonymous scanning.
  # To make it public: GitHub → jwilleke/fasten-onprem → Packages → fasten-onprem → Package settings → Change visibility → Public
  # Tags: :main (mutable, always latest) and :main-<run_number> (immutable, numerically sorted).
  # docker-jwilleke.yaml uses type=raw,value=main-${{ github.run_number }} so Flux
  # can apply numerical ordering to pick the latest build.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: fasten
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: fasten
  filterTags:
    # Matches main-<N> tags emitted by docker-jwilleke.yaml; extracts the
    # build number for numerical ordering.
    pattern: '^main-(\d+)$'
    extract: '$1'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: fasten
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        chore(image-automation): bump fasten to {{range .Changed.Changes}}{{.NewValue}} {{end}}
    push:
      branch: master
  update:
    # Scans deployment.yaml in the fasten app dir for the
    # `# {"$imagepolicy": "flux-system:fasten"}` setter marker.
    path: ./apps/production/fasten
    strategy: Setters
