apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: geohazardwatch
  namespace: flux-system
spec:
  image: ghcr.io/jwilleke/geohazardwatch
  interval: 10m
  # GHCR package is PUBLIC — scanned anonymously, no pull secret needed.
  # Was private via secretRef `ghcr-geohazardwatch` until 2026-05-16: the
  # fluxcdbot ghcr PAT in that secret was decommissioned 2026-05-15, so the
  # package was made public rather than re-issuing a long-lived token.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: geohazardwatch
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: geohazardwatch
  policy:
    semver:
      # Auto-update minor and patch within the current major.
      # Bumping past the next major requires updating this range manually.
      range: ">=1.0.0 <2.0.0"
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: geohazardwatch
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        chore(image-automation): bump geohazardwatch to {{range .Changed.Changes}}{{.NewValue}} {{end}}
    push:
      branch: master
  update:
    # Setters scan deployment.yaml / cronjob-import.yaml in the geohazardwatch
    # app dir for the `# {"$imagepolicy": "flux-system:geohazardwatch"}` marker
    # — that path is unchanged even though this manifest now lives elsewhere.
    path: ./apps/production/geohazardwatch
    strategy: Setters
