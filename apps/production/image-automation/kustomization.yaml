apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# No `namespace:` directive: every resource here lives in `flux-system`
# (where image-reflector-controller / image-automation-controller look)
# and declares its namespace explicitly.
resources:
  - yourphr-policy.yaml
  - geohazardwatch-policy.yaml
  - owntracks-policy.yaml
  # geohazardwatch-ghcr.sops.yaml removed 2026-05-16 — ghcr package made
  # public after the fluxcdbot PAT decommission (2026-05-15); the
  # ImageRepository now scans anonymously, no pull secret.
  - flux-system-git-auth.sops.yaml
