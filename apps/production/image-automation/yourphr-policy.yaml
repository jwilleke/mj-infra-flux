apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: yourphr
  namespace: flux-system
spec:
  image: ghcr.io/jwilleke/yourphr
  interval: 1m   # scan ghcr frequently so a new release deploys soon after the tag build publishes
  # GHCR package must be PUBLIC for anonymous scanning.
  # To make it public: GitHub → jwilleke/yourphr → Packages → yourphr → Package settings → Change visibility → Public
  # RELEASE-GATED: docker-jwilleke.yaml builds + publishes :X.Y.Z (+ :X.Y, :latest) ONLY on a vX.Y.Z
  # release tag. Pushes to main no longer build an image, so the live instance updates strictly when a
  # release is cut. The ImagePolicy below selects the highest semver tag.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: yourphr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: yourphr
  filterTags:
    # Matches the semver release tags emitted by docker-jwilleke.yaml on a vX.Y.Z tag
    # (type=semver,pattern={{version}} -> e.g. "1.6.0"). Non-release tags (:latest, :sha-*,
    # any leftover :main-*) are ignored, so only releases deploy.
    pattern: '^(\d+\.\d+\.\d+)$'
    extract: '$1'
  policy:
    semver:
      range: '>=1.0.0'
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: yourphr
  namespace: flux-system
spec:
  interval: 1m   # reconcile the deployment.yaml image bump promptly after a new tag is found (was 5m)
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        chore(image-automation): bump yourphr to {{range .Changed.Changes}}{{.NewValue}} {{end}}
    push:
      branch: master
  update:
    # Scans deployment.yaml in the yourphr app dir for the
    # `# {"$imagepolicy": "flux-system:yourphr"}` setter marker.
    path: ./apps/production/yourphr
    strategy: Setters
