apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: yourphr
  namespace: flux-system
spec:
  image: ghcr.io/jwilleke/yourphr
  interval: 1m   # scan ghcr frequently so a new build deploys soon after push (was 5m)
  # GHCR package must be PUBLIC for anonymous scanning.
  # To make it public: GitHub → jwilleke/yourphr → Packages → yourphr → Package settings → Change visibility → Public
  # Tags: :main (mutable, always latest) and :main-<run_number> (immutable, numerically sorted).
  # docker-jwilleke.yaml uses type=raw,value=main-${{ github.run_number }} so Flux
  # can apply numerical ordering to pick the latest build.
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: yourphr
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: yourphr
  filterTags:
    # Matches main-<N> tags emitted by docker-jwilleke.yaml; extracts the
    # build number for numerical ordering.
    pattern: '^main-(\d+)$'
    extract: '$1'
  policy:
    numerical:
      order: asc
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageUpdateAutomation
metadata:
  name: yourphr
  namespace: flux-system
spec:
  interval: 1m   # reconcile the deployment.yaml image bump promptly after a new tag is found (was 5m)
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: master
    commit:
      author:
        email: fluxcdbot@users.noreply.github.com
        name: fluxcdbot
      messageTemplate: |
        chore(image-automation): bump yourphr to {{range .Changed.Changes}}{{.NewValue}} {{end}}
    push:
      branch: master
  update:
    # Scans deployment.yaml in the yourphr app dir for the
    # `# {"$imagepolicy": "flux-system:yourphr"}` setter marker.
    path: ./apps/production/yourphr
    strategy: Setters
