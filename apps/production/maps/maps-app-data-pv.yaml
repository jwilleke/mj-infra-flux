apiVersion: v1
kind: PersistentVolume
metadata:
  name: maps-app-data-pv
  labels:
    app: maps
    type: app-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/local-k3s-data/maps/app-data
    type: DirectoryOrCreate
