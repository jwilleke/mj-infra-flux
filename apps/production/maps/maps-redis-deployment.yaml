apiVersion: apps/v1
kind: Deployment
metadata:
  name: maps-redis
  namespace: maps
  labels:
    app: maps-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: maps-redis
  template:
    metadata:
      labels:
        app: maps-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          command:
            - redis-server
            - --save
            - "900 1"
            - --save
            - "300 10"
            - --appendonly
            - "no"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          volumeMounts:
            - name: shared
              mountPath: /data
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: shared
          persistentVolumeClaim:
            claimName: maps-shared-pvc
      restartPolicy: Always
