apiVersion: v1
kind: ConfigMap
metadata:
  name: maps-config
  namespace: maps
data:
  RAILS_ENV: "production"
  SELF_HOSTED: "true"
  RAILS_LOG_TO_STDOUT: "true"
  APPLICATION_HOSTS: "maps.nerdsbythehour.com"
  APPLICATION_PROTOCOL: "https"
  TIME_ZONE: "America/New_York"
  STORE_GEODATA: "true"
  PROMETHEUS_EXPORTER_ENABLED: "false"
  WEB_CONCURRENCY: "1"
  BACKGROUND_PROCESSING_CONCURRENCY: "3"
  DATABASE_HOST: "maps-db.maps.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_USERNAME: "postgres"
  DATABASE_NAME: "maps_production"
  REDIS_URL: "redis://maps-redis.maps.svc.cluster.local:6379"
