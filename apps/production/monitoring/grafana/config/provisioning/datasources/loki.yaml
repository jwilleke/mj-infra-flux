apiVersion: 1

# Loki datasource for host logs shipped from deby by fluent-bit.
# Loki runs in this same namespace (monitoring) — see loki-deployment.yaml.
# fluent-bit on the deby host pushes via the NodePort (31100); Grafana
# inside the cluster reaches it as http://loki:3100.
datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: false
    jsonData:
      maxLines: 5000
      timeout: 60
