apiVersion: 1

# Elasticsearch datasource for host logs shipped from deby by fluent-bit.
# See deby repo: docs/monitoring.md and etc/fluent-bit/fluent-bit.conf
#
# The ES service is the sist2 Elasticsearch container running on deby
# itself (port 9200 on the host). We address it by the node's LAN IP so
# this works without depending on cluster DNS being able to resolve the
# external FQDN.
datasources:
  - name: Elasticsearch (system-logs)
    type: elasticsearch
    access: proxy
    url: http://192.168.68.71:9200
    isDefault: false
    editable: false
    jsonData:
      index: "[system-logs-]YYYY.MM.DD"
      interval: Daily
      timeField: "@timestamp"
      esVersion: "8.0.0"
      maxConcurrentShardRequests: 5
      # Make the Logs visualisation pick up the right fields out of the box
      logMessageField: MESSAGE
      logLevelField: log_level
