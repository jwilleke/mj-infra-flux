# based loosely on https://grafana.com/docs/grafana/latest/setup-grafana/installation/kubernetes/
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: grafana
  name: grafana
spec:
  serviceName: grafana

  replicas: 1
  selector:
    matchLabels:
      app: grafana
  
  template:  
    metadata:
      labels:
        app: grafana
      annotations:
        # the prometheus config is configured to look for this
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
    
    spec:    
      containers:
        - name: grafana
          # for latest tag: https://hub.docker.com/r/grafana/grafana/tags
          image: grafana/grafana:11.6.14
          
          ports:
            - containerPort: 3000
              name: http-grafana
              protocol: TCP

          # authentik OIDC SSO (APP-NATIVE-OIDC tier — see thishost docs/access/access-standards.md).
          # Grafana local login is intentionally left enabled as break-glass.
          env:
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.nerdsbythehour.com"
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "authentik"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "dQ1AzeCq9bo9u3GJLtpeoiKKWHuBHoiLANbtEk4r"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oauth
                  key: client-secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "https://auth.nerdsbythehour.com/application/o/authorize/"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "https://auth.nerdsbythehour.com/application/o/token/"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "https://auth.nerdsbythehour.com/application/o/userinfo/"
            # authentik groups -> Grafana role. authentik Admins / admin-21-fairway => Admin, else Viewer.
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'authentik Admins') && 'Admin' || contains(groups[*], 'admin-21-fairway') && 'Admin' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN
              value: "true"

            # State-history backend: Loki (mj-infra-flux#90)
            # alertingApiServer (Grafana 11 default=true) forces annotation backend — disable it
            # so the Loki state-history path is respected.
            - name: GF_FEATURE_TOGGLES_ENABLE
              value: "alertingApiServer false"
            - name: GF_UNIFIED_ALERTING_STATE_HISTORY_ENABLED
              value: "true"
            - name: GF_UNIFIED_ALERTING_STATE_HISTORY_BACKEND
              value: "loki"
            - name: GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_REMOTE_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"
            - name: GF_UNIFIED_ALERTING_STATE_HISTORY_LOKI_REMOTE_READ_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"

          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /robots.txt
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            successThreshold: 1
            timeoutSeconds: 2
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 3000
            timeoutSeconds: 1
          
          resources:
            requests:
              cpu: 250m
              memory: 750Mi
            limits:
              cpu: "1.0"
              memory: "2Gi"
          
          volumeMounts:
            # https://grafana.com/docs/grafana/latest/setup-grafana/configure-docker/#default-paths
            - mountPath: /var/lib/grafana
              name: grafana-pv
            # Mount datasource provisioning
            - mountPath: /etc/grafana/provisioning/datasources
              name: grafana-datasources
            # Mount dashboard provisioning config
            - mountPath: /etc/grafana/provisioning/dashboards
              name: grafana-dashboard-providers
            # Mount dashboard JSON files
            - mountPath: /var/lib/grafana/dashboards
              name: grafana-dashboards
      
      securityContext:
        # this user is on the node's os as the file system owner
        # https://kubernetes.io/docs/tasks/configure-pod-container/security-context/#set-the-security-context-for-a-pod
        runAsUser:  4020
        runAsGroup: 4020
        fsGroup:    4020

      # more general configuration for grafana in an ini file as described at https://grafana.com/docs/grafana/latest/setup-grafana/configure-grafana/
      volumes:
        - name: grafana-pv
          hostPath:
            # Updated to use local storage for better performance
            path: /mnt/local-k3s-data/grafana
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards