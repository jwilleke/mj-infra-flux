apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - node-exporter-daemonset.yaml
  - node-exporter-service.yaml

# NOTE (mj-infra-flux#74): a strategic-merge patch used to add
# --no-collector.systemd here. kustomize REPLACES a scalar `args` list
# (no merge key), so that patch would have clobbered the DaemonSet's
# --path.* / --collector.textfile.directory args down to a single flag.
# It was also inert until now (node-exporter was not in the monitoring
# kustomization). Collector flags are the DaemonSet's sole source of
# truth — edit node-exporter-daemonset.yaml, not a patch here.

labels:
  - pairs:
      app.jimwilleke.com/name: node-exporter
