apiVersion: v1
kind: Service
metadata:
    name: alertmanager
    annotations:
      # Picked up by the generic kubernetes-service-endpoints scrape job
      # (prometheus.yaml). Path must include the /alerting/list prefix -- same
      # requirement as the alerting.alertmanagers path_prefix in
      # prometheus.yaml, since --web.external-url=.../alerting/list makes
      # Alertmanager require that prefix on every incoming request, including
      # /metrics.
      prometheus.io/scrape: "true"
      prometheus.io/port: "9093"
      prometheus.io/path: "/alerting/list/metrics"

spec:
  # Exposes the Service on a cluster-internal IP. Choosing this value makes the Service only reachable from within the cluster
  # we don't expose this workload publicly, and the service really only is used to keep the IP more stable as pods bounce
  type: ClusterIP
  # Pinned rather than auto-assigned: *.svc.cluster.local hostnames don't
  # resolve from the deby host itself (no cluster DNS in its resolv.conf),
  # and there's no ingress to the real Alertmanager (the external-url's
  # grafana.nerdsbythehour.com/alerting/list path is Grafana's own
  # login-gated UI, not this Service). Host-local watchers (mj-infra-flux#86)
  # reach Alertmanager's webhook by hitting this ClusterIP directly, since
  # the k3s node IS this host — pinning makes that a documented contract
  # instead of an accident of auto-assignment.
  clusterIP: 10.43.84.204
  ports:
    - name: api
      port: 9093
      # targetPort name/port matches the container
      targetPort: api
  selector:
    app: alertmanager
    
