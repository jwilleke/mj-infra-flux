scrape_configs:
  # Blackbox HTTP probes for service health monitoring
  # Uses http_2xx_3xx module since many services redirect to Authentik for auth
  - job_name: "blackbox-http-services"
    metrics_path: /probe
    params:
      module: [http_2xx_3xx]
    static_configs:
      - targets:
          # Core infrastructure
          - https://nerdsbythehour.com
          - https://auth.nerdsbythehour.com
          # Applications
          - https://teslamate.nerdsbythehour.com
          - https://grafana.nerdsbythehour.com
          - https://ha.nerdsbythehour.com
          - https://maps.nerdsbythehour.com
          - https://geohazardwatch.com
          - https://netalertx.nerdsbythehour.com
          # Supporting services
          - https://cdn.nerdsbythehour.com
          # Excluded: traefik (internal), jimsmcp (internal — use the
          # "noc-monitor" Deployment-label convention instead, see
          # apps/production/monitoring/README.md), amd (known broken)
          #
          # Adding a new public app here is now the ONLY step needed for it
          # to appear in the Grafana env-health-noc "External Services" row —
          # that panel is a dynamic repeat over label_values(probe_success,
          # instance), no dashboard JSON edit required.
    relabel_configs:
      # Pass the target URL to blackbox exporter
      - source_labels: [__address__]
        target_label: __param_target
      # Set instance label to the target URL
      - source_labels: [__param_target]
        target_label: instance
      # Extract service name from URL for cleaner labeling
      - source_labels: [__param_target]
        regex: "https://([^.]+)\\.nerdsbythehour\\.com.*"
        replacement: "${1}"
        target_label: service
      # Point to blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter.monitoring.svc:9115
    scrape_interval: 60s
    scrape_timeout: 15s

  # Same as blackbox-http-services, but for targets that correctly enforce
  # HTTP Basic Auth instead of redirecting to Authentik -- a 401 here means
  # "reachable and correctly enforcing auth", not "down". See
  # http_2xx_3xx_401 in prometheus-blackbox-exporter/config/blackbox-config.yaml.
  - job_name: "blackbox-http-services-basicauth"
    metrics_path: /probe
    params:
      module: [http_2xx_3xx_401]
    static_configs:
      - targets:
          - https://owntracks.nerdsbythehour.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - source_labels: [__param_target]
        regex: "https://([^.]+)\\.nerdsbythehour\\.com.*"
        replacement: "${1}"
        target_label: service
      - target_label: __address__
        replacement: blackbox-exporter.monitoring.svc:9115
    scrape_interval: 60s
    scrape_timeout: 15s
