apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
data:
  # Loki rules live in /loki/rules/<tenant>/...; auth_enabled=false means
  # the implicit tenant is "fake".
  rules.yaml: |
    groups:
      - name: deby_host
        interval: 1m
        rules:

          # Fires when fluent-bit hasn't shipped any deby record for >10 min.
          # Most common cause: fluent-bit is stopped or Loki is unreachable.
          - alert: HostLogsAbsent
            expr: 'absent_over_time({host="deby"}[10m]) == 1'
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "No logs received from host deby for >10 min"
              description: |
                fluent-bit on deby has not shipped any journal/tcp/forward record
                in the last 10 minutes. Check `systemctl status fluent-bit` on
                the host and Loki ingest health.

          # Sustained elevated error rate. Note fluent-bit only ships
          # PRIORITY 3/4 (err/warning), so any "error" detected_level here
          # came from a real systemd-priority-3 entry.
          - alert: HostErrorRate
            expr: 'sum(count_over_time({host="deby", detected_level="error"}[5m])) > 5'
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Elevated error rate on host deby"
              description: |
                More than 5 priority-3 journal entries from deby in the last
                5 minutes. Investigate via Grafana → Explore → Loki:
                {host="deby", detected_level="error"}

          # Tripped by a marker line written by backup-deby's OnFailure
          # handler. See deby:systemd/backup-deby-fail.service.
          - alert: BackupDebyFailed
            expr: 'sum(count_over_time({host="deby"} |= "BACKUP-DEBY-FAILED"[15m])) > 0'
            labels:
              severity: critical
            annotations:
              summary: "backup-deby.service failed"
              description: |
                The nightly local backup of deby (to the deby-backup ZFS pool)
                did not complete successfully. Run on the host:
                  journalctl -u backup-deby.service -e
                  cat /deby-backup/host/meta/$(date +%F).log

          # ZFS pool unhealthy as reported by zpool status output captured
          # in the journal, OR a pool suspension / uncorrectable I/O / hung
          # task. The 2026-05-06 incident logged "uncorrectable I/O failure
          # and has been suspended" with pools still ONLINE — the old
          # zpool.*(DEGRADED|FAULTED|UNAVAIL) form would not have matched, so
          # the suspension/IO/hung-task phrases are matched anywhere on the
          # line (no zpool prefix). Companion Prometheus alerts
          # (ZfsPoolUnhealthy / BackupDebyStale) cover the Loki-down case.
          - alert: ZfsPoolDegraded
            expr: 'sum(count_over_time({host="deby"} |~ "(?i)(zpool.*(degraded|faulted|unavail)|uncorrectable i/o failure|has been suspended|suspended|blocked for more than .* seconds|hung_task)"[5m])) > 0'
            labels:
              severity: critical
            annotations:
              summary: "A ZFS pool on deby is unhealthy (degraded/faulted/unavail/suspended/IO error)"
              description: |
                Run on the host:  zpool status -v
                Backup pools (deby-backup, nas-backup) and any others.
                Triggers on DEGRADED/FAULTED/UNAVAIL, pool suspension,
                uncorrectable I/O failure, or kernel hung-task / blocked-task.

      # ───────────────────────────────────────────────────────────────
      # Central syslog Phase 3 (jwilleke/deby#20) — LogQL alerts over
      # the UDM Pro CEF stream landed in Loki via Phase 2 (deby#17).
      # Surfaces UniFi events in Grafana /alerting/list alongside the
      # host/cluster rules. Calibrated to today's empirical category
      # distribution (deby#20 issue body for full counts); thresholds
      # are conservative starters — tune over a ~7-day soak window.
      # ───────────────────────────────────────────────────────────────
      - name: deby_udmpro_syslog
        interval: 1m
        rules:

          # Dead-man's switch on the UDM Pro syslog feed itself. If the
          # rsyslog → fluent-bit → Loki path stops shipping for any
          # reason (UDM rebooted, rsyslog wedged, fluent-bit down),
          # downstream alerts go silent — this catches that. Tied to
          # the `{source="udmpro"}` label set by fluent-bit's
          # record_modifier filter in fluent-bit.conf.
          - alert: UDMProSyslogSilent
            expr: 'absent_over_time({source="udmpro"}[20m]) == 1'
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "No UDM Pro syslog received for >20 min"
              description: |
                The UDM Pro CEF stream has not reached Loki in 20 min (fires
                after 25 min total with the 5m for: window). The overnight
                stream runs at ~0.1 events/min with natural gaps up to ~21 min;
                widened from 10m to avoid false fires on normal quiet periods.
                A genuine pipeline failure would sustain silence well past 25 min.
                Check on the host:
                  systemctl status rsyslog fluent-bit
                  sudo tail /var/log/remote/udmpro/udmpro.log
                  ss -lnt | grep -E ':5140|:5141'

          # Any event in the "Critical" category. Rare by design — UniFi
          # reserves this for genuinely high-severity events (Spectrum
          # WAN flap, cluster-wide auth issue, etc.). 0 historical
          # events in the current log window, so a single one is
          # genuinely interesting.
          - alert: UDMProCriticalEvent
            expr: 'sum(count_over_time({source="udmpro"} |= "UNIFIcategory=Critical "[5m])) > 0'
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "UDM Pro emitted a Critical-category CEF event"
              description: |
                A `UNIFIcategory=Critical` CEF event landed in the UDM Pro
                stream. Inspect via:
                  {source="udmpro"} |= "UNIFIcategory=Critical"
                in Grafana → Explore → Loki for the full event payload.

          # IDS/IPS rate spike. Baseline: ~50 Security events/day = ~0.3
          # per 10m. Threshold > 5 in 10m catches port-scan bursts,
          # botnet probing, or coordinated attack patterns without
          # firing on routine background scanning.
          - alert: UDMProThreatRateSpike
            expr: 'sum(count_over_time({source="udmpro"} |= "UNIFIcategory=Security "[10m])) > 5'
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "UDM Pro IDS/IPS detection rate elevated (>5 in 10m)"
              description: |
                More than 5 Security-category CEF events in 10 minutes,
                well above the ~0.3/10m baseline. Likely a port scan
                burst or sustained attack pattern. Inspect:
                  {source="udmpro"} |= "UNIFIcategory=Security" |~ "msg="

          # Managed UniFi infrastructure went offline. Covers switches
          # and APs (and UDM Pro itself, though typically that breaks
          # the stream first → UDMProSyslogSilent fires instead). The
          # 2026-05-26 historical example: "US 8 60W-02FE went offline".
          # Verified to be the correct category name "UniFi Devices"
          # (not "Devices") via full-history grep.
          - alert: UDMProManagedDeviceOffline
            expr: 'sum by (device) (count_over_time({source="udmpro"} |= "UNIFIcategory=UniFi Devices" |= "went offline" | regexp "msg=(?P<device>.+?) went offline"[5m])) > 0'
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Managed UniFi device offline: {{ $labels.device }}"
              description: |
                {{ $labels.device }} went offline. Check uplink + power + parent
                switch port (UNIFIconnectedToDeviceName / UNIFIconnectedToDevicePort):
                  {source="udmpro"} |= "UNIFIcategory=UniFi Devices" |= "went offline"

          # Long-running wired client disconnected. Catches Protect-
          # camera-on-WiFi (Temp-G4-1 disconnected 2026-05-28 after 1d
          # 16h connected), wired servers (jMac, tower), and anything
          # else that was stably connected for >1 day suddenly going
          # away. Filters out routine phone/laptop roam-disconnects
          # which last minutes-to-hours.
          - alert: UDMProLongRunningClientOffline
            expr: 'sum by (client) (count_over_time({source="udmpro"} |~ "(Wired|WiFi) Client Disconnected" |~ "Time Connected: [0-9]+d" | regexp "msg=(?P<client>.+?) disconnected from"[10m])) > 0'
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Long-running client offline: {{ $labels.client }} (connected >1d)"
              description: |
                {{ $labels.client }} had been stably connected for ≥1 day and just
                disconnected. Could be intentional (unplug, power off) or a real
                failure (camera died, server rebooted). Inspect:
                  {source="udmpro"} |~ "(Wired|WiFi) Client Disconnected" |~ "Time Connected: [0-9]+d"

          # Camera-specific disconnect. Protect cameras are expected to
          # stay connected 24/7; ANY disconnect is interesting, not just
          # the >1d connected case caught by UDMProLongRunningClientOffline.
          # Matches the operator's camera inventory (see
          # thishost/docs/network-monitoring.md) by alias: known UniFi
          # camera names + the "Temp-G[3-5]-N" pattern + GRM-EAST/WEST +
          # any alias starting with "Cam " or model-numbered "G[3-5] ".
          # Add to the alternation as new cameras are adopted. Fires
          # for `for: 1m` so brief flaps land in /alerting/history but
          # don't trigger immediately on a single sample. Adds the
          # `device: camera` label so the route can subgroup if needed
          # via mj-infra-flux#86's unified delivery design.
          - alert: UDMProCameraDisconnected
            expr: 'sum by (client) (count_over_time({source="udmpro"} |~ "(WiFi|Wired) Client Disconnected" |~ "(?i)UNIFIclientAlias=(Temp-G[3-5]|GRM-(EAST|WEST)|Cam |Garage |Back |Drive |Office Camera|UP AI Port|G4 Bullet|G3 |G4 |G5 )" | regexp "msg=(?P<client>.+?) disconnected from"[10m])) > 0'
            for: 1m
            labels:
              severity: warning
              device: camera
            annotations:
              summary: "Protect camera disconnected: {{ $labels.client }}"
              description: |
                {{ $labels.client }} disconnected. Cameras are expected to stay
                connected 24/7. Check PoE port, NVR, and last connected AP:
                  {source="udmpro"} |~ "(WiFi|Wired) Client Disconnected" |~ "(?i)UNIFIclientAlias=(Temp-G[3-5]|GRM-|Cam |Garage|Back|Drive|Office Camera|UP AI Port|G4 Bullet)"

          # WAN connection lost. The "Internet and WAN" category covers
          # ISP connectivity transitions. Severity critical because the
          # entire LAN's outbound is affected. Includes "down",
          # "disconnected", and "interrupted" word patterns; tune after
          # observing real WAN-flap events during the soak window.
          - alert: UDMProWANDown
            expr: 'sum(count_over_time({source="udmpro"} |= "UNIFIcategory=Internet and WAN" |~ "(?i)(down|disconnected|interrupted|offline|lost)"[5m])) > 0'
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "UDM Pro reports WAN down/disconnected"
              description: |
                An `Internet and WAN` category CEF event matched a
                connection-loss pattern. The entire LAN's outbound
                connectivity is likely affected. Inspect:
                  {source="udmpro"} |= "UNIFIcategory=Internet and WAN"
                Check WAN interface on the UDM:
                  ssh udm 'ip a show eth8 ; ping -c2 1.1.1.1'

      # Phase 3 broadened to the Phase-4 direct device streams (deby#18 →
      # source=tank / source=protect, live 2026-05-30). NOTE: tank (UNAS
      # Pro 8) and protect (Protect/NVR) are EVENT-ONLY emitters — they
      # ship CEF only on admin actions / device events, with no continuous
      # heartbeat. So a dead-man's switch like UDMProSyslogSilent is
      # deliberately NOT replicated here (it would fire on normal quiet).
      # These devices' events are "UniFi OS" CEF (CEF:0|Ubiquiti|UniFi OS|
      # <ver>|<sigid>|<name>|<sev>|...) and do NOT carry UNIFIcategory=,
      # so matching is by event name / keyword, not category.
      #
      # As of drafting, the only observed events are routine admin/test
      # (Test Syslog, Admin Accessed UniFi OS, Admin Made Config Changes).
      # The operationally-interesting events (UNAS disk/RAID/SMART/capacity;
      # NVR storage/recording-stream/AI) have NOT yet been seen, so their
      # exact text is unknown. The two active rules below are therefore
      # DISCOVERY TRIPWIRES: surface any NON-routine event so the first
      # real disk/storage event lands in /alerting/history for triage —
      # then replace with the targeted rules sketched (commented) below.
      - name: deby_unifi_device_syslog
        interval: 1m
        rules:

          # UNAS Pro 8 (tank): any event that is not the known-routine
          # admin/test traffic. Catches the first disk/RAID/capacity event
          # whose exact wording we can't yet predict. Replace with
          # TankStorageDegraded / TankCapacityWarning once observed.
          - alert: TankNonRoutineEvent
            expr: 'sum(count_over_time({source="tank"} != "Test Syslog" !~ "Admin (Accessed UniFi OS|Made Config Changes)"[10m])) > 0'
            for: 1m
            labels:
              severity: warning
              device: unas
            annotations:
              summary: "UNAS Pro 8 (tank) emitted a non-routine syslog event"
              description: |
                tank shipped a CEF event outside the known-routine admin/test
                traffic. UNAS-internal disk / RAID / SMART / capacity events
                arrive ONLY on this direct stream (not via the UDM CEF
                pass-through). Inspect and then add a targeted rule:
                  {source="tank"} != "Test Syslog" !~ "Admin (Accessed|Made Config)"
                in Grafana → Explore → Loki.

          # UniFi Protect / NVR (protect): same discovery tripwire.
          - alert: ProtectNonRoutineEvent
            expr: 'sum(count_over_time({source="protect"} != "Test Syslog" !~ "Admin (Accessed UniFi OS|Made Config Changes)" !~ "UNIFIcategory=detection"[10m])) > 0'
            for: 1m
            labels:
              severity: warning
              device: nvr
            annotations:
              summary: "UniFi Protect / NVR (protect) emitted a non-routine syslog event"
              description: |
                protect shipped a CEF event outside the known-routine
                admin/test traffic. NVR storage / per-camera recording-stream
                health / AI-detection events arrive ONLY on this direct
                stream. Inspect and then add a targeted rule:
                  {source="protect"} != "Test Syslog" !~ "Admin (Accessed|Made Config)"
                in Grafana → Explore → Loki.

          # --- TARGETED DRAFTS (commented; UNVALIDATED keyword guesses) ----
          # Enable each once its real event text has been observed via the
          # tripwires above. The keyword alternations are best-guesses for
          # UniFi-OS device events and WILL need tuning against real payloads.
          #
          # - alert: TankStorageDegraded
          #   expr: 'sum(count_over_time({source="tank"} |~ "(?i)(raid|volume|disk|drive|smart).*(degrad|fail|offline|error|removed|unhealthy)"[10m])) > 0'
          #   for: 1m
          #   labels:
          #     severity: critical
          #     device: unas
          #   annotations:
          #     summary: "UNAS (tank) reported a storage/RAID/disk fault"
          #
          # - alert: TankCapacityWarning
          #   expr: 'sum(count_over_time({source="tank"} |~ "(?i)(capacity|disk space|volume full|threshold)"[10m])) > 0'
          #   for: 1m
          #   labels:
          #     severity: warning
          #     device: unas
          #   annotations:
          #     summary: "UNAS (tank) reported a capacity / space warning"
          #
          # - alert: ProtectStorageOrStream
          #   expr: 'sum(count_over_time({source="protect"} |~ "(?i)(storage|disk|recording|stream|camera).*(full|fail|lost|error|offline|stopped|disconnect)"[10m])) > 0'
          #   for: 1m
          #   labels:
          #     severity: warning
          #     device: nvr
          #   annotations:
          #     summary: "Protect/NVR reported a storage or recording-stream issue"
