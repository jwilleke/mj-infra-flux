apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - ./loki-pvc.yaml
  - ./loki-deployment.yaml
  - ./loki-service.yaml

configMapGenerator:
  # Content-hashed names auto-roll the Deployment on any change (see
  # mj-infra-flux#137) — same pattern as prometheus-alertmanager/config.
  - name: loki-config
    files:
      - ./config/loki.yaml
  - name: loki-rules
    files:
      - ./rules/rules.yaml

labels:
  - pairs:
      app.jimwilleke.com/name: loki
