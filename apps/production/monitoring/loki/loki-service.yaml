apiVersion: v1
kind: Service
metadata:
  name: loki
spec:
  # NodePort so the deby host's fluent-bit (running on the host, not in
  # the cluster) can ship logs in via http://127.0.0.1:31100/loki/api/v1/push.
  # In-cluster consumers (Grafana) reach it as http://loki:3100.
  type: NodePort
  selector:
    app.jimwilleke.com/name: loki
  ports:
    - name: http
      port: 3100
      targetPort: 3100
      nodePort: 31100
    - name: grpc
      port: 9095
      targetPort: 9095
