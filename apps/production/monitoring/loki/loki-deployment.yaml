apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  strategy:
    type: Recreate     # RWO local-path PVC; single-attach, no rolling — only one pod can hold the chunks dir
  selector:
    matchLabels:
      app.jimwilleke.com/name: loki
  template:
    metadata:
      labels:
        app.jimwilleke.com/name: loki
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: loki
          image: grafana/loki:3.2.1
          args:
            - "-config.file=/etc/loki/loki.yaml"
          ports:
            - name: http
              containerPort: 3100
            - name: grpc
              containerPort: 9095
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
            # Mount the ruler rules into the tenant subdir.  auth_enabled=false
            # means the implicit tenant is "fake".
            - name: rules
              mountPath: /loki/rules/fake/rules.yaml
              subPath: rules.yaml
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: rules
          configMap:
            name: loki-rules
        - name: data
          # Node-local internal disk via the default local-path storageclass.
          # Deliberately NOT on the /mnt/tank NFS automount: Loki + its ruler
          # must not share the storage/NFS failure domain they are meant to
          # alert on (jwilleke/mj-infra-flux#73). Log history is short-retention
          # telemetry, so node-local (un-backed-up) is the correct trade-off.
          persistentVolumeClaim:
            claimName: loki-data
