# Daily health check on the fluxcdbot fine-grained PAT used by Flux's
# ImageUpdateAutomation to push back to this repo. Catches two failure
# modes that bit us in #70:
#
#   1. PAT lost write permission (revoked, scope reduced, repo allowlist
#      changed). The PAT was working, then silently stopped.
#   2. PAT approached / passed expiration. Fine-grained PATs default to
#      short lifetimes; ours expires on whatever date you minted it for.
#
# How it works
# ------------
# Every authenticated GitHub API response includes a header
# `github-authentication-token-expiration: 2026-08-08 12:00:00 UTC`
# when called with a fine-grained PAT. We hit a cheap endpoint, parse
# the header, and compare to today.
#
# Failure modes:
#   - PAT request returns non-200      → workflow FAILS ("PAT lost access")
#   - Expiration within 14 days        → workflow FAILS ("PAT rotates soon")
#   - Expiration header missing        → workflow WARNS (classic PAT, or
#                                         API change; manual review needed)
#   - All good                         → workflow passes silently
#
# The PAT lives in TWO places:
#   - SOPS-encrypted Secret in apps/production/image-automation/
#     flux-system-git-auth.sops.yaml — what Flux's image-automation-
#     controller actually uses to push.
#   - This workflow's `FLUXCDBOT_PAT_HEALTHCHECK` GitHub Actions secret —
#     a separate copy used only by this check.
#
# Operators rotating the PAT MUST update BOTH. Yes, it's annoying. The
# alternative (decrypting SOPS in CI) would mean storing the age key in
# Actions too, broadening the blast radius. Two copies of the same PAT
# is a smaller footprint than one PAT + the master decryption key.
#
# When this workflow fails, the on-call action is:
#   1. Mint a new fine-grained PAT (Owner: jwilleke, Repos: mj-infra-flux,
#      Permissions: Contents R/W + Metadata R, Expiration: ≥90d).
#   2. Update SOPS:  ./private/encrypt-flux-git-auth-secret.sh  (paste new PAT)
#   3. Update Actions secret: gh secret set FLUXCDBOT_PAT_HEALTHCHECK -b "<new PAT>"
#   4. Commit + push the updated SOPS file. Flux reconciles + bot resumes.
#
# Companion bug: jwilleke/mj-infra-flux#70 (the original outage that
# motivated this check).

name: PAT health check

on:
  schedule:
    # Daily at 14:00 UTC (10:00 ET). Adjust if the on-call hour changes.
    - cron: '0 14 * * *'
  workflow_dispatch:  # let operators trigger ad-hoc

permissions:
  contents: read

jobs:
  check:
    name: Probe fluxcdbot PAT
    runs-on: ubuntu-latest
    steps:
      - name: Validate PAT and expiration
        env:
          PAT: ${{ secrets.FLUXCDBOT_PAT_HEALTHCHECK }}
          WARN_DAYS_BEFORE_EXPIRY: 14
        run: |
          set -euo pipefail

          if [ -z "${PAT}" ]; then
            echo "::error::FLUXCDBOT_PAT_HEALTHCHECK secret is not set."
            echo "::error::Add it with:"
            echo "::error::  gh secret set FLUXCDBOT_PAT_HEALTHCHECK -b '<the same PAT in flux-system-git-auth.sops.yaml>'"
            exit 1
          fi

          # Capability probe — also captures the expiration header.
          tmp=$(mktemp)
          status=$(curl -sS -o "$tmp" -D - -w "%{http_code}" \
            -H "Authorization: token ${PAT}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/jwilleke/mj-infra-flux" \
            | tee /tmp/headers.txt | tail -1) || status="000"

          echo "HTTP status: ${status}"

          # Capability check
          if [ "${status}" != "200" ]; then
            cat <<MSG >&2
          ::error::PAT failed capability probe. HTTP ${status}.
          ::error::Possible causes (in order of likelihood):
          ::error::  1. PAT revoked or expired
          ::error::  2. Repo allowlist no longer includes jwilleke/mj-infra-flux
          ::error::  3. PAT permissions reduced (Contents: R/W required)
          ::error::See workflow file header for the rotation runbook.
          MSG
            exit 1
          fi

          # Expiration check — header is lowercase per HTTP spec, but
          # casing varies in practice; grep case-insensitive.
          expiry=$(grep -i '^github-authentication-token-expiration:' /tmp/headers.txt | head -1 | sed -E 's/^[^:]+: *//' | tr -d '\r')

          if [ -z "${expiry}" ]; then
            cat <<MSG >&2
          ::warning::No 'github-authentication-token-expiration' header in response.
          ::warning::This might mean the PAT is a classic (non-expiring) token, or
          ::warning::GitHub's API changed. Manual review recommended:
          ::warning::https://github.com/settings/tokens
          MSG
            exit 0
          fi

          echo "PAT expires: ${expiry}"

          # Compute days remaining. Expiration format is "YYYY-MM-DD HH:MM:SS UTC".
          expiry_epoch=$(date -u -d "${expiry}" +%s)
          now_epoch=$(date -u +%s)
          days_remaining=$(( (expiry_epoch - now_epoch) / 86400 ))

          echo "Days until expiry: ${days_remaining}"
          echo "Threshold for warning: ${WARN_DAYS_BEFORE_EXPIRY} days"

          if [ "${days_remaining}" -lt 0 ]; then
            echo "::error::PAT has already expired ${days_remaining#-} days ago. Image-automation push has been broken since."
            echo "::error::Rotate immediately. See workflow file header for runbook."
            exit 1
          fi

          if [ "${days_remaining}" -le "${WARN_DAYS_BEFORE_EXPIRY}" ]; then
            echo "::error::PAT expires in ${days_remaining} day(s) — within the ${WARN_DAYS_BEFORE_EXPIRY}-day warning window."
            echo "::error::Mint a replacement and update both the SOPS file and the FLUXCDBOT_PAT_HEALTHCHECK Actions secret."
            echo "::error::See workflow file header for the rotation runbook."
            exit 1
          fi

          echo "::notice::PAT is healthy. ${days_remaining} days remaining until expiration (${expiry})."
